# Dân Cư Mạng — Docker Swarm stack
#
# Triển khai:
#   docker build -t dancumang:latest .
#   docker stack deploy -c deploy/stack.yml dancumang
#
# Dừng:
#   docker stack rm dancumang
#
# Stack chỉ chạy `web`, bind 127.0.0.1:8080 — đặt sau Cloudflare Tunnel / reverse proxy.
# Cần TLS public? Vẫn dùng docker-compose.yml với profile caddy thay vì stack.

services:
  web:
    image: dancumang:latest
    ports:
      - target: 80
        published: 8082
        protocol: tcp
        mode: host
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    read_only: true
    volumes:
      - type: tmpfs
        target: /var/cache/nginx
      - type: tmpfs
        target: /var/run
      - type: tmpfs
        target: /tmp
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
      - NET_BIND_SERVICE
    deploy:
      replicas: 1
      update_config:
        order: start-first
        parallelism: 1
        failure_action: rollback
        delay: 10s
      rollback_config:
        parallelism: 1
        order: stop-first
      restart_policy:
        condition: any
        delay: 5s
        max_attempts: 5
        window: 120s
      resources:
        limits:
          cpus: "0.50"
          memory: 128M
        reservations:
          cpus: "0.05"
          memory: 32M
    networks:
      - dancumang-net

networks:
  dancumang-net:
    driver: overlay
    attachable: true
