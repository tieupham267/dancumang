# Dân Cư Mạng — nginx cho static site
# Phù hợp deploy phía sau Cloudflare hoặc Caddy/Traefik làm TLS terminator.

server {
  listen 80;
  listen [::]:80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Charset cho tiếng Việt
  charset utf-8;

  # Gzip — Cloudflare cũng có thể nén lại, nhưng nén sẵn ở origin vẫn tốt
  gzip on;
  gzip_vary on;
  gzip_min_length 1024;
  gzip_proxied any;
  gzip_comp_level 6;
  gzip_types
    text/plain
    text/css
    text/xml
    text/javascript
    application/javascript
    application/xml
    application/xml+rss
    application/json
    application/rss+xml
    image/svg+xml
    font/woff
    font/woff2;

  # Security headers — site dạy bảo mật thì origin phải sạch trước
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "DENY" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), interest-cohort=()" always;
  add_header Cross-Origin-Opener-Policy "same-origin" always;
  add_header X-Robots-Tag "index, follow" always;

  # CSP — cho phép Google Fonts + ảnh từ các báo (vì blog đang nhúng ảnh từ thanhnien.vn)
  # Nếu sau này tự host ảnh, siết img-src lại còn 'self' data:
  add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'" always;

  # Khi đứng sau TLS terminator (Cloudflare full strict / Caddy / Traefik), bật HSTS:
  # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

  # Cache assets fingerprinted của Astro (đã có hash trong tên file).
  # `^~` để prefix location này win trước regex bên dưới.
  location ^~ /_astro/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    access_log off;
  }

  # Cache các asset tĩnh khác
  location ~* \.(?:css|js|woff2?|ttf|otf|eot|ico|svg|png|jpg|jpeg|gif|webp|avif)$ {
    expires 30d;
    add_header Cache-Control "public, max-age=2592000";
    access_log off;
  }

  # RSS — không cache lâu vì cảnh báo bảo mật cập nhật thường xuyên
  location = /rss.xml {
    add_header Cache-Control "public, max-age=600";
    types { } default_type application/rss+xml;
  }

  # Astro xuất /trang/index.html — nginx tự xử lý đuôi `/`.
  # Kết thúc bằng `=404` để fallback trả đúng status 404 (không phải 200).
  location / {
    try_files $uri $uri/ $uri.html $uri/index.html =404;
  }

  # 404 dùng đúng trang Astro
  error_page 404 /404.html;
  location = /404.html {
    internal;
  }

  # Chặn các path lộ liễu
  location ~ /\.(git|env|astro|vscode|idea) {
    deny all;
    return 404;
  }

  # Healthcheck nội bộ
  location = /healthz {
    access_log off;
    add_header Content-Type text/plain;
    return 200 "ok";
  }
}
