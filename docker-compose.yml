# Dân Cư Mạng — docker compose
#
# 2 cách dùng phổ biến trên VPS:
#
# 1) Đơn giản nhất (đứng sau Cloudflare Tunnel hoặc reverse proxy có sẵn):
#    docker compose up -d
#    → site lắng nghe http://127.0.0.1:8080
#
# 2) Tự lo TLS bằng Caddy (Let's Encrypt tự động):
#    DOMAIN=dancumang.vn ACME_EMAIL=you@example.com \
#      docker compose --profile caddy up -d
#    → mở cổng 80 + 443 trên VPS, Caddy lo cert
#
# Build lại sau khi thay đổi nội dung / code:
#    docker compose build --no-cache web && docker compose up -d

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: dancumang:latest
    container_name: dancumang-web
    restart: unless-stopped
    # Mặc định chỉ bind localhost — an toàn nếu chạy sau Cloudflare Tunnel hoặc Caddy.
    # Đổi thành "80:80" nếu muốn expose trực tiếp (không khuyến nghị).
    ports:
      - "127.0.0.1:${HTTP_PORT:-8080}:80"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - dancumang-net
    # Read-only filesystem + giảm quyền (nginx cần ghi vào /var/cache, /var/run, /tmp)
    read_only: true
    tmpfs:
      - /var/cache/nginx
      - /var/run
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
      - NET_BIND_SERVICE

  # ---- Reverse proxy có TLS tự động (tùy chọn) ----
  caddy:
    image: caddy:2-alpine
    container_name: dancumang-caddy
    restart: unless-stopped
    profiles: ["caddy"]
    depends_on:
      - web
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    environment:
      DOMAIN: ${DOMAIN:-dancumang.vn}
      ACME_EMAIL: ${ACME_EMAIL:-admin@dancumang.vn}
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - dancumang-net

networks:
  dancumang-net:
    driver: bridge

volumes:
  caddy_data:
  caddy_config:
